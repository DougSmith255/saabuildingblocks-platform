<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eXp Realty Team Name Change</title>
  <style>
    /* === BRAND FONTS === */
    @font-face {
      font-family: 'Taskor';
      src: url('../fonts/taskor-regular-webfont.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Amulya';
      src: url('../fonts/Amulya-Variable.woff2') format('woff2');
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Synonym';
      src: url('../fonts/Synonym-Variable.woff2') format('woff2');
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      font-family: 'Synonym', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #e5e4dd;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 32px 24px;
      position: relative;
      overflow-x: hidden;
    }

    /* === SPACE BACKGROUND === */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        radial-gradient(ellipse 120% 60% at 20% 10%, rgba(255,215,0,0.04) 0%, transparent 50%),
        radial-gradient(ellipse 80% 50% at 80% 80%, rgba(255,255,255,0.02) 0%, transparent 50%),
        radial-gradient(ellipse 60% 40% at 50% 50%, rgba(255,215,0,0.02) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* Subtle grid overlay */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image:
        linear-gradient(rgba(255,215,0,0.09) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,215,0,0.09) 1px, transparent 1px);
      background-size: 80px 80px;
      pointer-events: none;
      z-index: 0;
    }

    /* === STAR PARTICLES === */
    .stars {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #fff;
      border-radius: 50%;
      opacity: 0;
      animation: twinkle 4s infinite ease-in-out;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0; }
      50% { opacity: 0.6; }
    }

    .infographic {
      max-width: 1200px;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    /* === HEADER === */
    .header {
      text-align: center;
      margin-bottom: 32px;
      position: relative;
      padding-left: 90px;
    }

    .header .logo {
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      height: 60px;
      width: auto;
      filter: drop-shadow(0 0 20px rgba(255,215,0,0.3));
    }

    .header h1 {
      font-family: 'Taskor', sans-serif;
      font-size: 42px;
      font-weight: normal;
      letter-spacing: 0.02em;
      line-height: 1.1;
    }

    .header h1 .gold {
      color: #ffd700;
      text-shadow: 0 0 30px rgba(255,215,0,0.4), 0 0 60px rgba(255,215,0,0.15);
    }
    .header h1 .white {
      color: #e5e4dd;
      text-shadow: 0 0 20px rgba(255,255,255,0.15);
    }

    .header .subtitle {
      font-family: 'Amulya', sans-serif;
      margin-top: 10px;
      font-size: 14px;
      color: rgba(255,255,255,0.45);
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .header-divider {
      height: 2px;
      margin: 20px auto 0;
      max-width: 500px;
      background: linear-gradient(90deg, transparent, rgba(255,215,0,0.5), rgba(255,215,0,0.8), rgba(255,215,0,0.5), transparent);
      box-shadow: 0 0 15px rgba(255,215,0,0.3);
      border-radius: 2px;
    }

    /* === NAME CHANGE VISUAL === */
    .name-changes-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 20px;
    }

    .name-change-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 32px;
    }

    .name-box {
      background: linear-gradient(180deg, #1a1a1a 0%, #141414 100%);
      border: 1px solid rgba(255,215,0,0.2);
      border-radius: 16px;
      padding: 18px 36px;
      text-align: center;
      position: relative;
      width: 420px;
      box-shadow: 0 4px 30px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .name-box::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #ffd700, transparent);
      opacity: 0.7;
      border-radius: 16px 16px 0 0;
    }

    .name-box-label {
      font-family: 'Amulya', sans-serif;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.4);
      margin-bottom: 12px;
    }

    .name-box-value {
      font-family: 'Taskor', sans-serif;
      font-size: 24px;
      color: #e5e4dd;
      text-shadow: 0 0 15px rgba(255,255,255,0.1);
      white-space: nowrap;
    }

    .name-box.old .name-box-value {
      color: rgba(255,255,255,0.4);
      text-decoration: line-through;
      text-decoration-color: rgba(255,80,80,0.6);
      text-decoration-thickness: 2px;
    }

    .name-box.new .name-box-value {
      color: #ffd700;
      text-shadow: 0 0 20px rgba(255,215,0,0.3);
    }

    .name-box.new {
      border-color: rgba(255,215,0,0.35);
    }

    /* === ARROW === */
    .arrow-container {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .arrow-icon {
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .arrow-icon svg {
      width: 48px;
      height: 48px;
      fill: #ffd700;
      filter: drop-shadow(0 0 12px rgba(255,215,0,0.5));
      animation: pulse-arrow 2s infinite ease-in-out;
    }

    @keyframes pulse-arrow {
      0%, 100% { filter: drop-shadow(0 0 12px rgba(255,215,0,0.3)); transform: translateX(0); }
      50% { filter: drop-shadow(0 0 20px rgba(255,215,0,0.6)); transform: translateX(4px); }
    }

    /* === BRAND === */
    .brand {
      font-family: 'Synonym', sans-serif;
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.05em;
    }

    .brand a {
      color: rgba(255,215,0,0.45);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <!-- Star particles -->
  <div class="stars">
    <div class="star" style="top:5%;left:10%;animation-delay:0s;"></div>
    <div class="star" style="top:12%;left:25%;animation-delay:1.2s;"></div>
    <div class="star" style="top:8%;left:45%;animation-delay:0.5s;"></div>
    <div class="star" style="top:20%;left:60%;animation-delay:2.1s;"></div>
    <div class="star" style="top:3%;left:75%;animation-delay:0.8s;"></div>
    <div class="star" style="top:15%;left:90%;animation-delay:1.7s;"></div>
    <div class="star" style="top:35%;left:5%;animation-delay:3s;"></div>
    <div class="star" style="top:55%;left:35%;animation-delay:2.5s;"></div>
    <div class="star" style="top:40%;left:55%;animation-delay:1s;"></div>
    <div class="star" style="top:50%;left:70%;animation-delay:3.5s;"></div>
    <div class="star" style="top:65%;left:8%;animation-delay:2s;"></div>
    <div class="star" style="top:80%;left:15%;animation-delay:3.2s;"></div>
  </div>

  <div class="infographic">
    <!-- Header -->
    <div class="header">
      <img class="logo" src="saa-logo-gold.png" alt="Smart Agent Alliance">
      <h1><span class="gold">eXp Realty</span> <span class="white">Team Name Change</span></h1>
      <div class="header-divider"></div>
    </div>

    <!-- Old Names → New Names -->
    <div class="name-changes-grid">

      <div class="name-change-container">
        <div class="name-box old">
          <div class="name-box-label">Old Name</div>
          <div class="name-box-value">Domestic Team</div>
        </div>
        <div class="arrow-container">
          <div class="arrow-icon">
            <svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
          </div>
        </div>
        <div class="name-box new">
          <div class="name-box-label">New Name</div>
          <div class="name-box-value">Domestic Partnership</div>
        </div>
      </div>

      <div class="name-change-container">
        <div class="name-box old">
          <div class="name-box-label">Old Name</div>
          <div class="name-box-value">Self-Organized Team</div>
        </div>
        <div class="arrow-container">
          <div class="arrow-icon">
            <svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
          </div>
        </div>
        <div class="name-box new">
          <div class="name-box-label">New Name</div>
          <div class="name-box-value">Full Cap Team</div>
        </div>
      </div>

      <div class="name-change-container">
        <div class="name-box old">
          <div class="name-box-label">Old Name</div>
          <div class="name-box-value">Standard Team</div>
        </div>
        <div class="arrow-container">
          <div class="arrow-icon">
            <svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
          </div>
        </div>
        <div class="name-box new">
          <div class="name-box-label">New Name</div>
          <div class="name-box-value">Half Cap Team</div>
        </div>
      </div>

      <div class="name-change-container">
        <div class="name-box old">
          <div class="name-box-label">Old Name</div>
          <div class="name-box-value">Mega Icon Team</div>
        </div>
        <div class="arrow-container">
          <div class="arrow-icon">
            <svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
          </div>
        </div>
        <div class="name-box new">
          <div class="name-box-label">New Name</div>
          <div class="name-box-value">Quarter Cap Team</div>
        </div>
      </div>

    </div>

    <p class="brand">Smart Agent Alliance &mdash; <a href="https://smartagentalliance.com">smartagentalliance.com</a></p>
  </div>
</body>
</html>
